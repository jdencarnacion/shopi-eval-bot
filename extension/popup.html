<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .header {
      background: #13131a; padding: 11px 14px;
      border-bottom: 1px solid #2a2a3d;
      display: flex; align-items: center; gap: 8px;
    }
    .title { font-size: 14px; font-weight: 700; }
    .body { padding: 14px; }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; font-size: 12px; color: #7070a0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3a5a; flex-shrink: 0; }
    .dot.active { background: #22c55e; }

    .btn {
      width: 100%; padding: 10px 14px; border-radius: 7px; border: none;
      cursor: pointer; font-weight: 700; font-size: 13px;
      transition: opacity .15s; outline: none;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-start { background: #96bf48; color: #0a0a0f; }
    .btn-stop  { background: #2a2a3d; color: #e8e8f0; }

    .error { font-size: 11px; color: #ef4444; margin-top: 8px; line-height: 1.4; }
    .no-meet { font-size: 12px; color: #7070a0; text-align: center; padding: 4px 0 10px; line-height: 1.5; }

    .divider { border: none; border-top: 1px solid #1c1c27; margin: 14px 0; }

    .field-label { font-size: 10px; color: #7070a0; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; }
    .field-input {
      width: 100%; background: #1c1c27; border: 1px solid #2a2a3d;
      border-radius: 6px; padding: 7px 10px; color: #e8e8f0;
      font-size: 11px; outline: none;
    }
    .field-input:focus { border-color: #96bf48; }
    .field-hint { font-size: 10px; color: #4a4a6a; margin-top: 4px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:18px">🎯</span>
    <span class="title">Shopi Eval Bot</span>
  </div>
  <div class="body">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="statusText">Checking...</span>
    </div>

    <div id="meetUI" style="display:none">
      <button class="btn btn-start" id="mainBtn" disabled>Loading...</button>
      <div class="error" id="errMsg" style="display:none"></div>
    </div>

    <div id="noMeetUI" style="display:none" class="no-meet">
      Open a Google Meet call,<br>then click this icon to start.
    </div>

    <hr class="divider">

    <div class="field-label">Server URL</div>
    <input class="field-input" id="serverUrl" type="text" placeholder="http://localhost:3002" />
    <div class="field-hint">Where shopi-eval-bot is running (keep default unless deployed)</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
