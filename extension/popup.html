<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    body {
      width: 296px;
      background: linear-gradient(160deg, #0c0c20 0%, #07070f 100%);
      color: #e8e8f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.02);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, #14532d, #166534);
      border: 1px solid rgba(74,222,128,0.25);
      box-shadow: 0 0 14px rgba(74,222,128,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .brand { font-size: 14px; font-weight: 700; color: #f0f0ff; letter-spacing: -0.02em; }
    .version-pill {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 20px;
    }

    .body { padding: 16px; }

    .status-block {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 13px; border-radius: 12px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 13px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.12); flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot.active {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74,222,128,0.7);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    #statusText { font-size: 12px; color: rgba(255,255,255,0.38); flex: 1; line-height: 1.4; }
    #statusText.active { color: #4ade80; font-weight: 600; }

    .btn {
      width: 100%; padding: 11px 14px; border-radius: 11px; border: 1px solid;
      cursor: pointer; font-weight: 700; font-size: 13px; letter-spacing: -0.01em;
      transition: all 0.15s ease; outline: none;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none !important; box-shadow: none !important; }
    .btn-start {
      background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.28); color: #4ade80;
    }
    .btn-start:hover:not(:disabled) {
      background: rgba(74,222,128,0.18); border-color: rgba(74,222,128,0.48);
      box-shadow: 0 0 24px rgba(74,222,128,0.1); transform: translateY(-1px);
    }
    .btn-stop {
      background: rgba(248,113,113,0.07); border-color: rgba(248,113,113,0.2); color: #f87171;
    }
    .btn-stop:hover:not(:disabled) {
      background: rgba(248,113,113,0.13); border-color: rgba(248,113,113,0.35);
      transform: translateY(-1px);
    }

    .error {
      margin-top: 10px; padding: 9px 12px; border-radius: 9px;
      font-size: 11px; color: #f87171; line-height: 1.5;
      background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.15);
    }

    .no-meet {
      text-align: center; padding: 6px 0 10px;
      font-size: 12px; color: rgba(255,255,255,0.28); line-height: 1.7;
    }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 16px 0; }

    .field-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.22); margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px; padding: 8px 11px; color: #e0e0f0;
      font-size: 11px; outline: none; transition: border-color 0.15s;
    }
    .field-input:focus { border-color: rgba(74,222,128,0.35); }
    .field-hint { font-size: 10px; color: rgba(255,255,255,0.16); margin-top: 5px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">🎯</div>
      <span class="brand">Shopi Eval</span>
    </div>
    <span class="version-pill">Discovery</span>
  </div>

  <div class="body">
    <div id="meetUI" style="display:none">
      <div class="status-block">
        <div class="dot" id="dot"></div>
        <span id="statusText">Ready</span>
      </div>
      <button class="btn btn-start" id="mainBtn" disabled>Loading…</button>
      <div class="error" id="errMsg" style="display:none"></div>
    </div>

    <div id="noMeetUI" style="display:none" class="no-meet">
      Open a Google Meet call,<br>then click this icon to begin.
    </div>

    <hr class="divider">

    <div class="field-label">Server URL</div>
    <input class="field-input" id="serverUrl" type="text" placeholder="http://localhost:3002" />
    <div class="field-hint">Where shopi-eval-bot is running</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
